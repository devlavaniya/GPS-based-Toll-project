{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" href="{% static 'img/apple-icon.png' %}">
  <link rel="icon" type="image/png" href="{% static 'img/logo1.png' %}">
  <title>Login Account</title>
  <!-- Fonts and icons -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
  <!-- Nucleo Icons -->
  <link href="{% static 'css/nucleo-icons.css' %}" rel="stylesheet" />
  <link href="{% static 'css/nucleo-svg.css' %}" rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <!-- CSS Files -->
  <link id="pagestyle" href="{% static 'css/soft-ui-dashboard.css' %}" rel="stylesheet" />
</head>

<body >
<div style="background-color: #1c111f;">
  <div class="container position-sticky z-index-sticky top-0">
    <div class="row">
      <div class="col-12">
        <!-- Navbar -->
        <!-- End Navbar -->
      </div>
    </div>
  </div>

  <main class="main-content mt-0">
    <section>
      <div class="page-header min-vh-75">
        <div class="container">
          <div class="row">
            <h2 class="font-weight-bolder text-info text-gradient"
              style="padding-left: 20px; margin-left: 10px; padding-top: 10px; margin-top: 10px;margin-bottom:-80px;">
              Toll Tax by Coord.</h2>

            <div class="col-xl-4 col-lg-5 col-md-6 d-flex flex-column mx-auto">
              <div class="card card-plain mt-8">
                <h2 class="font-weight-bolder text-info text-gradient" style="padding-left: 20px; margin-left: 10px;">!!
                  Please Sign In !!</h2>
                <div class="card-header pb-0 text-left bg-transparent">
                  <h3 class="font-weight-bolder text-info text-gradient">Welcome back</h3>
                  <p class="mb-0">Enter your email and password to sign in</p>
                </div>
                <div class="card-body">
                  <form action="{% url 'login_attempt' %}" role="form" method="post">
                    {% csrf_token %}
                    <label>Email</label>
                    <div class="mb-3">
                      <input type="text" class="form-control" placeholder="Email" aria-label="Email"
                        aria-describedby="email-addon" name="email" required>
                    </div>
                    <label>Password</label>
                    <div class="mb-3">
                      <input type="password" class="form-control" placeholder="Password" aria-label="Password"
                        aria-describedby="password-addon" name="password" required>
                    </div>

                    <div class="form-check form-switch d-flex align-items-center">
                      <input class="form-check-input me-2" type="checkbox" id="rememberMe" name="remember_me" checked>
                      <label class="form-check-label me-3  mt-2 fs-6" for="rememberMe">Remember me</label>
                      <p class="text-sm mb-0">
                        <a href="{% url 'forget_password' %}" class="text-info text-gradient font-weight-bold">Forgot your password?</a>
                      </p>
                    </div>
                    <!-- <style>
                      .custom-label {
                        font-size: 1.25rem; /* Increase the font size of the label */
                      }
                      .extra-space {
                        margin-left: 20px; /* Add extra space between the label and the paragraph */
                      }
                    </style>
                    
                    <div class="form-check form-switch d-flex align-items-center">
                      <input class="form-check-input me-2" type="checkbox" id="rememberMe" name="remember_me" checked>
                      <label class="form-check-label custom-label me-3" for="rememberMe">Remember me</label>
                      <p class="text-sm mb-0 extra-space">
                        <a href="{% url 'forget_password' %}" class="text-info text-gradient font-weight-bold">Forgot your password?</a>
                      </p>
                    </div> -->
                                        
                    <div class="text-center">
                      <button type="submit" class="btn bg-gradient-info w-100 mt-4 mb-0">Sign in</button>
                    </div>

                  </form>
                  
                  {% load socialaccount %}
                  <div class="btn-wrapper text-center mt-4">
                    <h4 class="font-weight-bold text-info mb-3">Or</h4>
                    <form action="{% provider_login_url 'google' %}" method="POST">
                      {% csrf_token %}
                      <button type="submit" class="btn bg-gradient-danger w-100">
                        <i class="fab fa-google me-2"></i>
                        Sign in with Google
                      </button>
                    </form>
                  </div>
                </div>
                <div class="card-footer text-center pt-0 px-lg-2 px-1">
                  <p class="mb-4 text-sm mx-auto">
                    Don't have an account?
                    <a href="{% url 'register_attempt' %}" class="text-info text-gradient font-weight-bold">Sign up</a>
                  </p>
                  
                </div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="oblique position-absolute top-0 h-100 d-md-block d-none me-n8">
                <div class="oblique-image bg-cover position-absolute fixed-top ms-auto h-100 z-index-0 ms-n6"
                  style="background-image:url('{% static 'img/curved-images/map_1_img.jpeg' %}')"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

</div>

  <script src="{% static 'js/core/popper.min.js' %}"></script>
  <script src="{% static 'js/core/bootstrap.min.js' %}"></script>
  <script src="{% static 'js/plugins/perfect-scrollbar.min.js' %}"></script>
  <script src="{% static 'js/plugins/smooth-scrollbar.min.js' %}"></script>
  <script>
    var win = navigator.platform.indexOf('Win') > -1;
    if (win && document.querySelector('#sidenav-scrollbar')) {
      var options = {
        damping: '0.5'
      }
      Scrollbar.init(document.querySelector('#sidenav-scrollbar'), options);
    }
  </script>
  <!-- Github buttons -->
  <!-- Github buttons -->
  <script async defer src="https://buttons.github.io/buttons.js"></script>
  <!-- Control Center for Soft Dashboard: parallax effects, scripts for the example pages etc -->
  <script src="{% static '/js/soft-ui-dashboard.min.js?v=1.0.3' %}"></script>



  <script>
    {% if messages %}
    {% for message in messages %}
    Swal.fire({
      title: '{{ message.tags|capfirst }}',
      text: '{{ message }}',
      icon: '{{ message.tags }}',
      background: '#1c1e25',
      color: 'white',
      confirmButtonColor: '#272a34',
      iconColor: '#f39422',
      confirmButtonText: 'OK',
      allowOutsideClick: false,
      allowEscapeKey: false
    });
    {% endfor %}
    {% endif %}

  </script>
</body>

</html>
